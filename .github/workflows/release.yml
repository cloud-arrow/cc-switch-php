name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for test build (e.g. dev)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  SPC_PHP_VERSION: "8.3"
  SPC_EXTENSIONS: "swoole,pdo_sqlite,phar,curl,openssl,mbstring,tokenizer,filter,zlib,sockets,pcntl,posix,ctype,fileinfo,session"

jobs:
  phar:
    name: Build .phar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pdo_sqlite, tokenizer, mbstring, filter, zlib

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

      - name: Download Box
        run: |
          curl -fSL -o box.phar https://github.com/box-project/box/releases/download/4.6.6/box.phar
          chmod +x box.phar

      - name: Compile .phar
        run: php box.phar compile

      - name: Upload .phar artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-phar
          path: build/cc-switch.phar

  build:
    name: Build (${{ matrix.target }})
    needs: phar
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            spc_os: linux
            spc_arch: x86_64
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            spc_os: linux
            spc_arch: aarch64
          - target: macos-aarch64
            runner: macos-latest
            spc_os: macos
            spc_arch: aarch64

    steps:
      - name: Download .phar
        uses: actions/download-artifact@v4
        with:
          name: cc-switch-phar
          path: build

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y re2c flex cmake build-essential

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install re2c flex cmake

      - name: Download spc
        run: |
          curl -fsSL -o spc.tgz \
            "https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-${{ matrix.spc_os }}-${{ matrix.spc_arch }}.tar.gz"
          tar -xzf spc.tgz
          chmod +x spc

      - name: Setup spc environment
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo ./spc doctor --auto-fix
          else
            ./spc doctor --auto-fix
          fi

      - name: Download PHP sources
        run: |
          CUSTOM_URL_FLAG=""
          if ! curl -sfSL --max-time 10 "https://www.php.net/releases/index.php?json&version=${{ env.SPC_PHP_VERSION }}" > /dev/null 2>&1; then
            echo "php.net unreachable, using GitHub mirror"
            CUSTOM_URL_FLAG="--custom-url=php-src:https://github.com/php/php-src/archive/refs/tags/php-8.3.30.tar.gz"
          fi

          ./spc download \
            --with-php="${{ env.SPC_PHP_VERSION }}" \
            --for-extensions="${{ env.SPC_EXTENSIONS }}" \
            --prefer-pre-built \
            ${CUSTOM_URL_FLAG}

      - name: Build micro.sfx
        run: ./spc build "${{ env.SPC_EXTENSIONS }}" --build-micro

      - name: Create standalone binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi

          MICRO_SFX="$(find buildroot -name 'micro.sfx' -type f | head -1)"
          if [ -z "${MICRO_SFX}" ]; then
            echo "Error: micro.sfx not found"
            exit 1
          fi

          OUTPUT="build/cc-switch-${VERSION}-${{ matrix.target }}"
          cat "${MICRO_SFX}" build/cc-switch.phar > "${OUTPUT}"
          chmod +x "${OUTPUT}"
          echo "Built: ${OUTPUT} ($(du -h "${OUTPUT}" | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-${{ matrix.target }}
          path: build/cc-switch-*-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum cc-switch-${{ github.ref_name }}-* > checksums-${{ github.ref_name }}.sha256
          cat checksums-${{ github.ref_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cc-switch-${{ github.ref_name }}-*
            artifacts/checksums-${{ github.ref_name }}.sha256
